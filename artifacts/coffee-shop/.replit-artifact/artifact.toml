kind = "mobile"
previewPath = "/"
title = "Coffee Shop Manager"
version = "1.0.0"
id = "artifacts/coffee-shop"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22955

[services.development]
run = "pnpm --filter @workspace/coffee-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coffee-shop", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/coffee-shop", "run", "serve" ]

[services.env]
PORT = "22955"
BASE_PATH = "/"
